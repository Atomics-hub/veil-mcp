name: Feature request
description: Suggest a policy, detection, integration, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What MCP risk or workflow should Veil handle better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant MCP clients, servers, policies, or examples.

